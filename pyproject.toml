[tool.uv.workspace]
members = ["apps/api", "packages/shared"]

[tool.uv.sources]
agentic-ecommerce-api = { workspace = true }
agentic-ecommerce-shared = { workspace = true }

[dependency-groups]
dev = [
    "ruff>=0.6.0",
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "aiosqlite>=0.22.1",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP", "N"]

[tool.pytest.ini_options]
testpaths = ["apps/api/tests", "packages/shared/tests"]
asyncio_mode = "auto"
addopts = "--import-mode=importlib"
