[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentic-ecommerce-shared"
version = "0.1.0"
description = "Shared types and utilities for the agentic-ecommerce monorepo."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agentic_ecommerce_shared"]
