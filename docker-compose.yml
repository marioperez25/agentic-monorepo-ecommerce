services:
  postgres:
    image: postgres:17-alpine
    container_name: agentic-ecommerce-postgres
    environment:
      POSTGRES_USER: agentic_ecommerce
      POSTGRES_PASSWORD: agentic_ecommerce
      POSTGRES_DB: agentic_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic_ecommerce -d agentic_ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
